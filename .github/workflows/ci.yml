name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release readiness (smoke + gates)
        run: npm run release:check

      - name: Validate frontend env (secrets do repositório)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -n "${VITE_SUPABASE_URL:-}" ] && [ -n "${VITE_SUPABASE_ANON_KEY:-}" ]; then
            npm run validate:env:frontend
          else
            echo "Skipping validate:env:frontend (VITE_SUPABASE_* não definidos nos secrets do repo)."
          fi

      - name: Lint changed files
        run: npm run lint:changed

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
        timeout-minutes: 5

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        timeout-minutes: 3

      - name: E2E smoke (preview em 4173)
        run: |
          set -e
          npm run preview -- --host 127.0.0.1 --port 4173 --strictPort &
          PREVIEW_PID=$!
          for _ in $(seq 1 90); do
            if curl -fsS "http://127.0.0.1:4173/" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:4173/" >/dev/null
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:4173 npm run test:e2e
          kill "$PREVIEW_PID" 2>/dev/null || true
        env:
          CI: true
